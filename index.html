<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>济祯的工作记录站 | Work Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #161616;
      --bg-tertiary: #1f1f1f;
      --bg-hover: #262626;
      --fg-primary: #e5e5e5;
      --fg-secondary: #a3a3a3;
      --fg-muted: #525252;
      --accent: #22d3ee;
      --accent-dim: rgba(34, 211, 238, 0.1);
      --success: #4ade80;
      --success-dim: rgba(74, 222, 128, 0.1);
      --warning: #fbbf24;
      --warning-dim: rgba(251, 191, 36, 0.1);
      --error: #f87171;
      --border: #2a2a2a;
      --radius: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f5f5f5;
      --bg-hover: #e5e5e5;
      --fg-primary: #171717;
      --fg-secondary: #525252;
      --fg-muted: #a3a3a3;
      --accent: #0891b2;
      --accent-dim: rgba(8, 145, 178, 0.1);
      --success: #16a34a;
      --success-dim: rgba(22, 163, 74, 0.1);
      --warning-dim: rgba(251, 191, 36, 0.1);
      --border: #e5e5e5;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-tertiary);
      padding: 4px;
      border-radius: var(--radius);
    }

    .tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--bg-secondary);
      color: var(--fg-primary);
    }

    .tab:hover:not(.active) {
      color: var(--fg-primary);
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--fg-primary);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo span { color: var(--accent); }

    .logo-tabs {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .search-box {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search-box input::placeholder { color: var(--fg-muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-muted);
      pointer-events: none;
    }

    .header-actions { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--fg-primary);
    }

    .btn:hover { background: var(--bg-hover); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn-primary:hover { filter: brightness(1.1); }

    .btn-icon {
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main Layout */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }

    .main.full-width {
      grid-template-columns: 1fr;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 88px;
      height: fit-content;
    }

    .sidebar-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--fg-muted);
      margin-top: 2px;
    }

    /* Progress Overview */
    .progress-overview {
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      padding: 16px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-title {
      font-size: 13px;
      color: var(--fg-secondary);
    }

    .progress-percent {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    .progress-bar-bg {
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Weight Tracker */
    .weight-display {
      text-align: center;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .weight-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 36px;
      font-weight: 600;
      color: var(--fg-primary);
    }

    .weight-unit {
      font-size: 16px;
      color: var(--fg-muted);
      margin-left: 4px;
    }

    .weight-change {
      font-size: 13px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .weight-change.down { color: var(--success); }
    .weight-change.up { color: var(--error); }
    .weight-change.same { color: var(--fg-muted); }

    .bmi-info {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .bmi-item {
      text-align: center;
    }

    .bmi-label {
      font-size: 11px;
      color: var(--fg-muted);
      margin-bottom: 2px;
    }

    .bmi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
    }

    .goal-weight {
      padding: 12px;
      background: var(--accent-dim);
      border-radius: var(--radius);
      border: 1px solid var(--accent);
    }

    .goal-label {
      font-size: 12px;
      color: var(--fg-muted);
      margin-bottom: 4px;
    }

    .goal-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    .goal-progress {
      margin-top: 8px;
    }

    .goal-progress-bar {
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      overflow: hidden;
    }

    .goal-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* Content */
    .content { min-width: 0; }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .content-title {
      font-size: 20px;
      font-weight: 600;
    }

    /* Weight Page */
    .weight-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .weight-chart-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .weight-chart {
      height: 200px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding-top: 20px;
    }

    .chart-bar {
      flex: 1;
      background: var(--accent-dim);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      position: relative;
      transition: background 0.2s;
      cursor: pointer;
    }

    .chart-bar:hover {
      background: var(--accent);
    }

    .chart-bar-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--fg-muted);
      white-space: nowrap;
    }

    .weight-input-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      color: var(--fg-secondary);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-field {
      flex: 1;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg-primary);
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Meal Recommendations */
    .meal-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 24px;
    }

    .meal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .meal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .meal-calories {
      font-size: 13px;
      color: var(--fg-muted);
    }

    .meal-calories span {
      color: var(--accent);
      font-weight: 600;
    }

    .meal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .meal-tab {
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 20px;
      color: var(--fg-secondary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .meal-tab.active {
      background: var(--accent);
      color: #000;
    }

    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .meal-card {
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .meal-card:hover {
      background: var(--bg-hover);
      transform: translateY(-2px);
    }

    .meal-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .meal-name {
      font-size: 14px;
      font-weight: 500;
    }

    .meal-brand {
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .meal-desc {
      font-size: 12px;
      color: var(--fg-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .meal-nutrition {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .nutrition-item {
      display: flex;
      flex-direction: column;
    }

    .nutrition-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--fg-primary);
    }

    .nutrition-label {
      color: var(--fg-muted);
      font-size: 10px;
    }

    .meal-tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--success-dim);
      color: var(--success);
      font-size: 11px;
      border-radius: 10px;
      margin-top: 8px;
    }

    /* Entry Card */
    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .entry-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .entry-card:hover {
      border-color: var(--fg-muted);
      transform: translateY(-1px);
    }

    .entry-card.completed { opacity: 0.7; }
    .entry-card.completed .entry-title {
      text-decoration: line-through;
      color: var(--fg-muted);
    }

    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .entry-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .entry-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--fg-muted);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .entry-checkbox:hover { border-color: var(--accent); }
    .entry-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }
    .entry-checkbox.checked svg { color: #000; }

    .entry-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg-primary);
    }

    .entry-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--fg-muted);
      flex-shrink: 0;
    }

    .entry-content {
      font-size: 14px;
      color: var(--fg-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
      margin-left: 30px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Task List */
    .task-list {
      margin-left: 30px;
      margin-bottom: 12px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      margin-bottom: 6px;
      transition: all 0.15s;
    }

    .task-item:hover { background: var(--bg-hover); }
    .task-item.completed { opacity: 0.6; }
    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--fg-muted);
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid var(--fg-muted);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .task-checkbox:hover { border-color: var(--accent); }
    .task-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--fg-primary);
    }

    .task-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--fg-muted);
    }

    .task-status.done {
      background: var(--success-dim);
      color: var(--success);
    }

    /* Entry Progress */
    .entry-progress {
      margin-left: 30px;
      margin-bottom: 12px;
    }

    .entry-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .entry-progress-label {
      font-size: 12px;
      color: var(--fg-muted);
    }

    .entry-progress-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
    }

    .entry-progress-bar {
      height: 6px;
      background: var(--bg-primary);
      border-radius: 3px;
      overflow: hidden;
    }

    .entry-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .entry-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: 30px;
    }

    .tag {
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 12px;
      color: var(--fg-secondary);
    }

    .tag.project {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .entry-type {
      margin-left: auto;
      font-size: 12px;
      color: var(--fg-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .delete-btn:hover {
      opacity: 1;
      color: var(--error);
    }

    /* Date Group */
    .date-group {
      margin-bottom: 32px;
    }

    .date-group-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-muted);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-group-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--fg-muted);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--fg-secondary);
      margin-bottom: 4px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 90%;
      max-width: 680px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
    }

    .modal-close:hover { color: var(--fg-primary); }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* Tags Input */
    .tags-input-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 44px;
    }

    .tags-input-container:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .tag-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      font-size: 13px;
    }

    .tag-chip button {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .tag-chip button:hover { color: var(--error); }

    .tags-input {
      flex: 1;
      min-width: 100px;
      border: none;
      background: transparent;
      color: var(--fg-primary);
      font-size: 14px;
      font-family: inherit;
    }

    .tags-input:focus { outline: none; }

    /* Task Editor */
    .task-editor {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .task-editor-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .task-editor-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .task-editor-item:last-child { border-bottom: none; }

    .task-editor-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--fg-primary);
      font-size: 14px;
      font-family: inherit;
    }

    .task-editor-input:focus { outline: none; }

    .task-editor-remove {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-editor-item:hover .task-editor-remove { opacity: 1; }
    .task-editor-remove:hover { color: var(--error); }

    .task-editor-add {
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--fg-muted);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }

    .task-editor-add:hover {
      background: var(--bg-tertiary);
      color: var(--fg-primary);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .weight-page {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
      }

      .sidebar { position: static; }
      .search-box { display: none; }
      .form-row { grid-template-columns: 1fr; }
      .logo-tabs { display: none; }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .entry-card, .meal-card {
      animation: fadeIn 0.3s ease forwards;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-tabs">
        <div class="logo"><span>//</span> 济祯的工作记录站</div>
        <div class="tabs">
          <button class="tab active" data-page="work">工作记录</button>
          <button class="tab" data-page="weight">体重管理</button>
        </div>
      </div>
      
      <div class="search-box" id="searchBox">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索工作记录...">
      </div>

      <div class="header-actions">
        <button class="btn btn-icon" id="themeToggle" title="切换主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="btn btn-primary" id="newEntryBtn">
          <span>+ 新记录</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Work Page -->
  <main class="main" id="workPage">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">整体进度</div>
        <div class="progress-overview">
          <div class="progress-header">
            <span class="progress-title">任务完成率</span>
            <span class="progress-percent" id="overallProgress">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="overallProgressBar" style="width: 0%"></div>
          </div>
          <div class="progress-stats">
            <span id="completedCount">0 完成</span>
            <span id="totalCount">0 总计</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">统计</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">总记录</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statThisWeek">0</div>
            <div class="stat-label">本周</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statProjects">0</div>
            <div class="stat-label">项目数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statStreak">0</div>
            <div class="stat-label">连续天数</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <section class="content">
      <div class="content-header">
        <h1 class="content-title">全部记录</h1>
      </div>

      <div class="entries-list" id="entriesList">
        <!-- Entries will be rendered here -->
      </div>
    </section>
  </main>

  <!-- Weight Page -->
  <main class="main full-width" id="weightPage" style="display: none;">
    <div style="width: 100%;">
      <div class="weight-page">
        <!-- Left Column: Chart & Input -->
        <div>
          <div class="weight-chart-container">
            <div class="chart-title">
              <span>体重趋势</span>
              <span style="font-size: 12px; color: var(--fg-muted);">最近30天</span>
            </div>
            <div class="weight-chart" id="weightChart">
              <!-- Chart bars will be rendered here -->
            </div>
          </div>

          <div class="weight-input-section" style="margin-top: 16px;">
            <div class="chart-title">记录体重</div>
            <div class="input-group">
              <div class="input-row">
                <input type="number" step="0.1" class="input-field" id="weightInput" placeholder="输入体重 (kg)">
                <button class="btn btn-primary" id="saveWeightBtn">保存</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column: Stats -->
        <div>
          <div class="weight-input-section">
            <div class="chart-title">身体数据</div>
            
            <div class="weight-display">
              <span class="weight-value" id="currentWeight">--</span>
              <span class="weight-unit">kg</span>
              <div class="weight-change same" id="weightChange">
                <span>暂无数据</span>
              </div>
            </div>

            <div class="bmi-info">
              <div class="bmi-item">
                <div class="bmi-label">身高</div>
                <div class="bmi-value">188 cm</div>
              </div>
              <div class="bmi-item">
                <div class="bmi-label">BMI</div>
                <div class="bmi-value" id="bmiValue">--</div>
              </div>
              <div class="bmi-item">
                <div class="bmi-label">状态</div>
                <div class="bmi-value" id="bmiStatus">--</div>
              </div>
            </div>

            <div class="goal-weight">
              <div class="goal-label">目标体重</div>
              <div class="goal-value">85 kg</div>
              <div class="goal-progress">
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--fg-muted); margin-bottom: 4px;">
                  <span id="weightToGo">--</span>
                  <span id="goalPercent">0%</span>
                </div>
                <div class="goal-progress-bar">
                  <div class="goal-progress-fill" id="goalProgressFill" style="width: 0%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Meal Recommendations -->
      <div class="meal-section">
        <div class="meal-header">
          <div>
            <div class="meal-title">健康外卖推荐</div>
            <div class="meal-calories">建议每日摄入: <span id="dailyCalories">~2000</span> kcal</div>
          </div>
        </div>

        <div class="meal-tabs">
          <button class="meal-tab active" data-meal="breakfast">早餐</button>
          <button class="meal-tab" data-meal="lunch">午餐</button>
          <button class="meal-tab" data-meal="dinner">晚餐</button>
        </div>

        <div class="meal-grid" id="mealGrid">
          <!-- Meals will be rendered here -->
        </div>
      </div>
    </div>
  </main>

  <!-- New Entry Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">新建记录</h2>
        <button class="modal-close" id="modalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="entryForm">
          <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" id="entryTitle" placeholder="简短描述这条记录..." required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">类型</label>
              <select class="form-input" id="entryType">
                <option value="log">工作日志</option>
                <option value="progress">项目进度</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">日期</label>
              <input type="date" class="form-input" id="entryDate">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">内容</label>
            <textarea class="form-input form-textarea" id="entryContent" placeholder="详细记录工作内容..."></textarea>
          </div>

          <div class="form-group" id="taskEditorGroup" style="display: none;">
            <label class="form-label">任务清单（项目进度专用）</label>
            <div class="task-editor">
              <div class="task-editor-list" id="taskEditorList"></div>
              <button type="button" class="task-editor-add" id="addTaskBtn">+ 添加任务</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">标签（按回车添加）</label>
            <div class="tags-input-container" id="tagsContainer">
              <input type="text" class="tags-input" id="tagsInput" placeholder="输入标签...">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalSave">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ============ DATA ============
    let entries = JSON.parse(localStorage.getItem('workEntries') || '[]');
    let weightData = JSON.parse(localStorage.getItem('weightData') || '[]');
    let currentPage = 'work';
    let currentMealTab = 'breakfast';
    let editingId = null;
    let tags = [];
    let editTasks = [];

    // User Profile
    const userProfile = {
      height: 188,
      startWeight: 88.4,
      goalWeight: 85
    };

    // Meal Recommendations (Health-focused, suitable for weight loss)
    const mealRecommendations = {
      breakfast: [
        { name: '鸡蛋麦满分', brand: '麦当劳', desc: '蛋白丰富，碳水适中，早餐首选', calories: 310, protein: 17, carbs: 30, fat: 12, tag: '低卡' },
        { name: '原味土豆饼 + 豆浆', brand: '麦当劳', desc: '素食选择，搭配无糖豆浆更健康', calories: 280, protein: 8, carbs: 42, fat: 10, tag: '素食' },
        { name: '皮蛋瘦肉粥', brand: '肯德基', desc: '热粥暖胃，蛋白质适中', calories: 320, protein: 14, carbs: 48, fat: 8, tag: '暖胃' },
        { name: '芝士蛋堡（去酱）', brand: '麦当劳', desc: '要求去酱减少热量，高蛋白', calories: 280, protein: 15, carbs: 26, fat: 12, tag: '高蛋白' },
        { name: '醇豆浆 + 油条', brand: '肯德基', desc: '经典搭配，偶尔吃可以', calories: 350, protein: 10, carbs: 52, fat: 12, tag: '经典' },
        { name: '燕麦杯', brand: '星巴克', desc: '低GI碳水，饱腹感强', calories: 280, protein: 8, carbs: 45, fat: 6, tag: '低GI' }
      ],
      lunch: [
        { name: '板烧鸡腿堡', brand: '麦当劳', desc: '烤制而非油炸，相对健康', calories: 470, protein: 26, carbs: 48, fat: 18, tag: '推荐' },
        { name: '麦辣鸡腿堡（去酱）', brand: '麦当劳', desc: '要求去酱，减少约50大卡', calories: 450, protein: 22, carbs: 50, fat: 18, tag: '少酱' },
        { name: '新奥尔良烤鸡腿堡', brand: '肯德基', desc: '烤制工艺，比炸鸡健康', calories: 490, protein: 24, carbs: 52, fat: 20, tag: '烤制' },
        { name: '藤椒鸡腿排饭', brand: '肯德基', desc: '米饭减半更健康，蛋白质充足', calories: 550, protein: 28, carbs: 65, fat: 18, tag: '饱腹' },
        { name: '深海鳕鱼堡', brand: '麦当劳', desc: '鱼肉蛋白质，比牛肉低脂', calories: 420, protein: 20, carbs: 46, fat: 16, tag: '低脂' },
        { name: '沙拉 + 鸡胸肉', brand: '赛百味', desc: '最健康选择，注意酱料用量', calories: 320, protein: 24, carbs: 28, fat: 10, tag: '最健康' }
      ],
      dinner: [
        { name: '玉米杯 + 苹果片', brand: '麦当劳', desc: '轻食晚餐，热量控制', calories: 180, protein: 4, carbs: 42, fat: 2, tag: '轻食' },
        { name: '嫩牛五方（小份）', brand: '麦当劳', desc: '控制份量，晚餐少碳水', calories: 380, protein: 18, carbs: 38, fat: 16, tag: '小份' },
        { name: '老北京鸡肉卷', brand: '肯德基', desc: '有蔬菜搭配，相对均衡', calories: 420, protein: 20, carbs: 48, fat: 16, tag: '均衡' },
        { name: '香菇鸡肉粥', brand: '肯德基', desc: '晚餐清淡，易消化', calories: 280, protein: 12, carbs: 42, fat: 6, tag: '清淡' },
        { name: '金枪鱼沙拉', brand: '赛百味', desc: '高蛋白低脂，晚餐首选', calories: 280, protein: 22, carbs: 20, fat: 12, tag: '高蛋白' },
        { name: '关东煮（蔬菜为主）', brand: '便利店', desc: '选择萝卜、海带、魔芋丝', calories: 200, protein: 8, carbs: 30, fat: 4, tag: '低卡' }
      ]
    };

    // ============ DOM ELEMENTS ============
    const searchInput = document.getElementById('searchInput');
    const entriesList = document.getElementById('entriesList');
    const modalOverlay = document.getElementById('modalOverlay');
    const entryForm = document.getElementById('entryForm');
    const themeToggle = document.getElementById('themeToggle');
    const tagsInput = document.getElementById('tagsInput');
    const tagsContainer = document.getElementById('tagsContainer');
    const taskEditorList = document.getElementById('taskEditorList');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const entryType = document.getElementById('entryType');

    // ============ INITIALIZE ============
    document.addEventListener('DOMContentLoaded', () => {
      loadTheme();
      
      if (weightData.length === 0) {
        weightData.push({ date: new Date().toISOString().split('T')[0], weight: 88.4 });
        localStorage.setItem('weightData', JSON.stringify(weightData));
      }
      
      renderEntries();
      updateStats();
      updateOverallProgress();
      renderWeightPage();
      
      document.getElementById('entryDate').valueAsDate = new Date();
    });

    // ============ THEME ============
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });

    function loadTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    }

    // ============ PAGE TABS ============
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        currentPage = tab.dataset.page;
        document.getElementById('workPage').style.display = currentPage === 'work' ? 'grid' : 'none';
        document.getElementById('weightPage').style.display = currentPage === 'weight' ? 'block' : 'none';
        document.getElementById('searchBox').style.display = currentPage === 'work' ? 'block' : 'none';
        document.getElementById('newEntryBtn').style.display = currentPage === 'work' ? 'flex' : 'none';
        
        if (currentPage === 'weight') {
          renderWeightPage();
        }
      });
    });

    // ============ SEARCH ============
    searchInput.addEventListener('input', (e) => {
      renderEntries(e.target.value);
    });

    // ============ MODAL ============
    document.getElementById('newEntryBtn').addEventListener('click', () => openModal());
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveEntry);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    function openModal(entry = null) {
      editingId = entry ? entry.id : null;
      tags = entry ? [...entry.tags] : [];
      editTasks = entry && entry.tasks ? [...entry.tasks] : [];
      
      document.getElementById('modalTitle').textContent = entry ? '编辑记录' : '新建记录';
      document.getElementById('entryTitle').value = entry ? entry.title : '';
      document.getElementById('entryType').value = entry ? entry.type : 'log';
      document.getElementById('entryDate').value = entry ? entry.date : new Date().toISOString().split('T')[0];
      document.getElementById('entryContent').value = entry ? entry.content : '';
      
      document.getElementById('taskEditorGroup').style.display = 
        (entry ? entry.type : 'log') === 'progress' ? 'block' : 'none';
      
      renderTags();
      renderTaskEditor();
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      editingId = null;
      tags = [];
      editTasks = [];
      entryForm.reset();
      renderTags();
      renderTaskEditor();
    }

    // ============ ENTRY TYPE ============
    entryType.addEventListener('change', () => {
      document.getElementById('taskEditorGroup').style.display = 
        entryType.value === 'progress' ? 'block' : 'none';
    });

    // ============ TAGS ============
    function renderTags() {
      const chips = tags.map((tag, i) => `
        <span class="tag-chip">
          ${escapeHtml(tag)}
          <button type="button" onclick="removeTag(${i})">×</button>
        </span>
      `).join('');
      
      tagsContainer.innerHTML = chips + '<input type="text" class="tags-input" id="tagsInput" placeholder="输入标签...">';
      document.getElementById('tagsInput').addEventListener('keydown', handleTagInput);
    }

    function handleTagInput(e) {
      if (e.key === 'Enter' && e.target.value.trim()) {
        e.preventDefault();
        tags.push(e.target.value.trim());
        renderTags();
      }
    }

    function removeTag(index) {
      tags.splice(index, 1);
      renderTags();
    }

    // ============ TASK EDITOR ============
    function renderTaskEditor() {
      taskEditorList.innerHTML = editTasks.map((task, i) => `
        <div class="task-editor-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="2">
            <circle cx="12" cy="12" r="1"></circle>
          </svg>
          <input type="text" class="task-editor-input" value="${escapeHtml(task.text)}" 
                 onchange="updateTaskText(${i}, this.value)" placeholder="任务内容...">
          <button type="button" class="task-editor-remove" onclick="removeTask(${i})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      `).join('');
    }

    addTaskBtn.addEventListener('click', () => {
      editTasks.push({ text: '', done: false });
      renderTaskEditor();
      const inputs = taskEditorList.querySelectorAll('.task-editor-input');
      if (inputs.length > 0) inputs[inputs.length - 1].focus();
    });

    function updateTaskText(index, value) { editTasks[index].text = value; }
    function removeTask(index) { editTasks.splice(index, 1); renderTaskEditor(); }

    // ============ SAVE ENTRY ============
    function saveEntry() {
      const title = document.getElementById('entryTitle').value.trim();
      const content = document.getElementById('entryContent').value.trim();
      const type = document.getElementById('entryType').value;
      
      if (!title) { alert('请填写标题'); return; }
      if (type === 'log' && !content) { alert('请填写内容'); return; }
      if (type === 'progress' && editTasks.filter(t => t.text.trim()).length === 0) { alert('请至少添加一个任务'); return; }

      const entry = {
        id: editingId || Date.now(),
        title, type,
        date: document.getElementById('entryDate').value,
        content: type === 'log' ? content : '',
        tasks: type === 'progress' ? editTasks.filter(t => t.text.trim()) : [],
        tags: [...tags],
        completed: editingId ? entries.find(e => e.id === editingId)?.completed || false : false,
        createdAt: editingId ? entries.find(e => e.id === editingId)?.createdAt : Date.now()
      };

      if (editingId) {
        const index = entries.findIndex(e => e.id === editingId);
        entries[index] = entry;
      } else {
        entries.unshift(entry);
      }

      localStorage.setItem('workEntries', JSON.stringify(entries));
      closeModal();
      renderEntries();
      updateStats();
      updateOverallProgress();
    }

    // ============ TOGGLE FUNCTIONS ============
    function toggleEntryComplete(id, e) {
      e.stopPropagation();
      const entry = entries.find(en => en.id === id);
      if (entry) {
        entry.completed = !entry.completed;
        localStorage.setItem('workEntries', JSON.stringify(entries));
        renderEntries(searchInput.value);
        updateOverallProgress();
      }
    }

    function toggleTask(entryId, taskIndex, e) {
      e.stopPropagation();
      const entry = entries.find(en => en.id === entryId);
      if (entry && entry.tasks[taskIndex]) {
        entry.tasks[taskIndex].done = !entry.tasks[taskIndex].done;
        entry.completed = entry.tasks.every(t => t.done);
        localStorage.setItem('workEntries', JSON.stringify(entries));
        renderEntries(searchInput.value);
        updateOverallProgress();
      }
    }

    function deleteEntry(id, e) {
      e.stopPropagation();
      if (confirm('确定删除这条记录吗？')) {
        entries = entries.filter(entry => entry.id !== id);
        localStorage.setItem('workEntries', JSON.stringify(entries));
        renderEntries();
        updateStats();
        updateOverallProgress();
      }
    }

    // ============ RENDER ENTRIES ============
    function renderEntries(searchQuery = '') {
      let filtered = entries;
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filtered = filtered.filter(e => 
          e.title.toLowerCase().includes(query) ||
          e.content.toLowerCase().includes(query) ||
          e.tags.some(t => t.toLowerCase().includes(query)) ||
          e.tasks.some(t => t.text.toLowerCase().includes(query))
        );
      }

      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

      const grouped = {};
      filtered.forEach(entry => {
        const dateKey = entry.date;
        if (!grouped[dateKey]) grouped[dateKey] = [];
        grouped[dateKey].push(entry);
      });

      if (filtered.length === 0) {
        entriesList.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <div class="empty-title">暂无记录</div>
            <div>点击「新记录」开始记录你的工作</div>
          </div>
        `;
        return;
      }

      entriesList.innerHTML = Object.entries(grouped).map(([date, dateEntries]) => `
        <div class="date-group">
          <div class="date-group-title">${formatDate(date)}</div>
          ${dateEntries.map(entry => renderEntryCard(entry)).join('')}
        </div>
      `).join('');
    }

    function renderEntryCard(entry) {
      const typeLabels = { log: '日志', progress: '进度' };

      if (entry.type === 'progress') {
        const doneTasks = entry.tasks.filter(t => t.done).length;
        const totalTasks = entry.tasks.length;
        const progress = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;

        return `
          <div class="entry-card ${entry.completed ? 'completed' : ''}" onclick="openModal(${JSON.stringify(entry).replace(/"/g, '&quot;')})">
            <div class="entry-header">
              <div class="entry-title-row">
                <div class="entry-checkbox ${entry.completed ? 'checked' : ''}" onclick="toggleEntryComplete(${entry.id}, event)">
                  ${entry.completed ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                </div>
                <div class="entry-title">${escapeHtml(entry.title)}</div>
              </div>
              <div class="entry-date">${entry.date}</div>
            </div>
            
            <div class="entry-progress">
              <div class="entry-progress-header">
                <span class="entry-progress-label">进度</span>
                <span class="entry-progress-value">${doneTasks}/${totalTasks} (${progress}%)</span>
              </div>
              <div class="entry-progress-bar">
                <div class="entry-progress-fill" style="width: ${progress}%"></div>
              </div>
            </div>
            
            <div class="task-list">
              ${entry.tasks.map((task, i) => `
                <div class="task-item ${task.done ? 'completed' : ''}" onclick="toggleTask(${entry.id}, ${i}, event)">
                  <div class="task-checkbox ${task.done ? 'checked' : ''}">
                    ${task.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                  </div>
                  <span class="task-text">${escapeHtml(task.text)}</span>
                  <span class="task-status ${task.done ? 'done' : ''}">${task.done ? '已完成' : '待办'}</span>
                </div>
              `).join('')}
            </div>
            
            <div class="entry-footer">
              ${entry.tags.map(tag => `<span class="tag project">${escapeHtml(tag)}</span>`).join('')}
              <div class="entry-type">
                <span>${typeLabels[entry.type]}</span>
                <button class="delete-btn" onclick="deleteEntry(${entry.id}, event)" title="删除">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
      } else {
        return `
          <div class="entry-card ${entry.completed ? 'completed' : ''}" onclick="openModal(${JSON.stringify(entry).replace(/"/g, '&quot;')})">
            <div class="entry-header">
              <div class="entry-title-row">
                <div class="entry-checkbox ${entry.completed ? 'checked' : ''}" onclick="toggleEntryComplete(${entry.id}, event)">
                  ${entry.completed ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                </div>
                <div class="entry-title">${escapeHtml(entry.title)}</div>
              </div>
              <div class="entry-date">${entry.date}</div>
            </div>
            <div class="entry-content">${escapeHtml(entry.content)}</div>
            <div class="entry-footer">
              ${entry.tags.map(tag => `<span class="tag project">${escapeHtml(tag)}</span>`).join('')}
              <div class="entry-type">
                <span>${typeLabels[entry.type]}</span>
                <button class="delete-btn" onclick="deleteEntry(${entry.id}, event)" title="删除">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
      }
    }

    // ============ STATS ============
    function updateOverallProgress() {
      const allTasks = entries.filter(e => e.type === 'progress').flatMap(e => e.tasks);
      const total = allTasks.length;
      const completed = allTasks.filter(t => t.done).length;
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('overallProgress').textContent = percent + '%';
      document.getElementById('overallProgressBar').style.width = percent + '%';
      document.getElementById('completedCount').textContent = completed + ' 完成';
      document.getElementById('totalCount').textContent = total + ' 总计';
    }

    function updateStats() {
      const total = entries.length;
      const projects = new Set(entries.flatMap(e => e.tags)).size;
      
      const now = new Date();
      const weekStart = new Date(now.setDate(now.getDate() - now.getDay()));
      weekStart.setHours(0, 0, 0, 0);
      const thisWeek = entries.filter(e => new Date(e.date) >= weekStart).length;

      const streak = calculateStreak();

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statThisWeek').textContent = thisWeek;
      document.getElementById('statProjects').textContent = projects;
      document.getElementById('statStreak').textContent = streak;
    }

    function calculateStreak() {
      if (entries.length === 0) return 0;
      const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
      let streak = 0;
      let currentDate = new Date();
      currentDate.setHours(0, 0, 0, 0);

      for (const dateStr of dates) {
        const entryDate = new Date(dateStr);
        entryDate.setHours(0, 0, 0, 0);
        const diffDays = Math.floor((currentDate - entryDate) / (1000 * 60 * 60 * 24));
        if (diffDays <= 1) { streak++; currentDate = entryDate; } else { break; }
      }
      return streak;
    }

    // ============ WEIGHT PAGE ============
    function renderWeightPage() {
      renderWeightChart();
      updateWeightStats();
      renderMeals();
    }

    function renderWeightChart() {
      const chart = document.getElementById('weightChart');
      const last30Days = weightData.slice(-30);
      
      if (last30Days.length === 0) {
        chart.innerHTML = '<div style="text-align: center; color: var(--fg-muted); width: 100%;">暂无数据</div>';
        return;
      }

      const weights = last30Days.map(d => d.weight);
      const minW = Math.min(...weights) - 1;
      const maxW = Math.max(...weights) + 1;
      const range = maxW - minW;

      chart.innerHTML = last30Days.map((d, i) => {
        const height = ((d.weight - minW) / range) * 180 + 20;
        const date = new Date(d.date);
        const label = `${date.getMonth() + 1}/${date.getDate()}`;
        return `
          <div class="chart-bar" style="height: ${height}px" title="${d.weight}kg">
            <div class="chart-bar-label">${label}</div>
          </div>
        `;
      }).join('');
    }

    function updateWeightStats() {
      const current = weightData.length > 0 ? weightData[weightData.length - 1].weight : null;
      
      document.getElementById('currentWeight').textContent = current ? current.toFixed(1) : '--';
      
      // Weight change
      const changeEl = document.getElementById('weightChange');
      if (weightData.length >= 2) {
        const prev = weightData[weightData.length - 2].weight;
        const diff = current - prev;
        if (diff < 0) {
          changeEl.className = 'weight-change down';
          changeEl.innerHTML = `<span>↓ ${Math.abs(diff).toFixed(1)} kg</span>`;
        } else if (diff > 0) {
          changeEl.className = 'weight-change up';
          changeEl.innerHTML = `<span>↑ ${diff.toFixed(1)} kg</span>`;
        } else {
          changeEl.className = 'weight-change same';
          changeEl.innerHTML = `<span>无变化</span>`;
        }
      }

      // BMI
      if (current) {
        const bmi = current / ((userProfile.height / 100) ** 2);
        document.getElementById('bmiValue').textContent = bmi.toFixed(1);
        
        let status = '';
        let color = '';
        if (bmi < 18.5) { status = '偏瘦'; color = 'var(--warning)'; }
        else if (bmi < 24) { status = '正常'; color = 'var(--success)'; }
        else if (bmi < 28) { status = '偏胖'; color = 'var(--warning)'; }
        else { status = '肥胖'; color = 'var(--error)'; }
        
        document.getElementById('bmiStatus').textContent = status;
        document.getElementById('bmiStatus').style.color = color;

        // Goal progress
        const totalToLose = userProfile.startWeight - userProfile.goalWeight;
        const lost = userProfile.startWeight - current;
        const progress = Math.max(0, Math.min(100, (lost / totalToLose) * 100));
        
        document.getElementById('weightToGo').textContent = `还需减 ${(current - userProfile.goalWeight).toFixed(1)} kg`;
        document.getElementById('goalPercent').textContent = progress.toFixed(0) + '%';
        document.getElementById('goalProgressFill').style.width = progress + '%';

        // Daily calories estimate
        const bmr = 10 * current + 6.25 * userProfile.height - 5 * 25 + 5; // Assuming age 25
        const tdee = bmr * 1.375; // Light activity
        const deficit = tdee - 500; // 500 cal deficit for weight loss
        document.getElementById('dailyCalories').textContent = Math.round(deficit);
      }
    }

    // Save weight
    document.getElementById('saveWeightBtn').addEventListener('click', () => {
      const input = document.getElementById('weightInput');
      const weight = parseFloat(input.value);
      
      if (!weight || weight < 30 || weight > 200) {
        alert('请输入有效的体重 (30-200 kg)');
        return;
      }

      const today = new Date().toISOString().split('T')[0];
      const existingIndex = weightData.findIndex(d => d.date === today);
      
      if (existingIndex >= 0) {
        weightData[existingIndex].weight = weight;
      } else {
        weightData.push({ date: today, weight });
      }
      
      weightData.sort((a, b) => new Date(a.date) - new Date(b.date));
      localStorage.setItem('weightData', JSON.stringify(weightData));
      
      input.value = '';
      renderWeightPage();
    });

    // ============ MEALS ============
    function renderMeals() {
      const meals = mealRecommendations[currentMealTab] || [];
      const grid = document.getElementById('mealGrid');
      
      grid.innerHTML = meals.map(meal => `
        <div class="meal-card">
          <div class="meal-card-header">
            <div class="meal-name">${meal.name}</div>
            <div class="meal-brand">${meal.brand}</div>
          </div>
          <div class="meal-desc">${meal.desc}</div>
          <div class="meal-nutrition">
            <div class="nutrition-item">
              <span class="nutrition-value">${meal.calories}</span>
              <span class="nutrition-label">kcal</span>
            </div>
            <div class="nutrition-item">
              <span class="nutrition-value">${meal.protein}g</span>
              <span class="nutrition-label">蛋白质</span>
            </div>
            <div class="nutrition-item">
              <span class="nutrition-value">${meal.carbs}g</span>
              <span class="nutrition-label">碳水</span>
            </div>
            <div class="nutrition-item">
              <span class="nutrition-value">${meal.fat}g</span>
              <span class="nutrition-label">脂肪</span>
            </div>
          </div>
          <div class="meal-tag">${meal.tag}</div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.meal-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMealTab = tab.dataset.meal;
        renderMeals();
      });
    });

    // ============ HELPERS ============
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      
      if (date.getTime() === today.getTime()) return '今天 · ' + date.toLocaleDateString('zh-CN', options);
      if (date.getTime() === yesterday.getTime()) return '昨天 · ' + date.toLocaleDateString('zh-CN', options);
      
      return date.toLocaleDateString('zh-CN', options);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
